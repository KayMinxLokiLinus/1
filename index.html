<button onclick="toggle('a')">EV Technician</button>
<div id="a" style="display:none;">รายละเอียด A</div>

<button onclick="toggle('b')">EV Engineer</button>
<div id="b" style="display:none;">รายละเอียด B</div>

<script>
function toggle(id) {
  const el = document.getElementById(id);
  el.style.display = el.style.display === "none" ? "block" : "none";
}
</script>
